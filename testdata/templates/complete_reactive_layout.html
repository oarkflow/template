<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${siteTitle} - ${pageTitle}</title>
  <style>
    body { font-family: Georgia, "Times New Roman", serif; margin: 0; background: linear-gradient(180deg, #f5f1e8, #ffffff); color: #1f2937; }
    header, footer { padding: 1.25rem 1.5rem; background: #1f2937; color: #f9fafb; }
    nav { display: flex; gap: 1rem; flex-wrap: wrap; }
    nav a { color: #fde68a; text-decoration: none; }
    main { max-width: 72rem; margin: 0 auto; padding: 1.5rem; }
    .hero, .panel, .card, .stream-shell { background: rgba(255,255,255,0.9); border: 1px solid #e5e7eb; border-radius: 16px; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08); }
    .hero { padding: 1.5rem; margin-bottom: 1.5rem; }
    .grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .card { padding: 1rem; }
    .slot-title { margin: 0; }
    .controls { display: flex; gap: 0.75rem; flex-wrap: wrap; margin: 1rem 0; }
    button[data-spl-onclick] { border: 0; background: #0f766e; color: white; padding: 0.65rem 1rem; border-radius: 999px; cursor: pointer; }
    .panel { padding: 1rem; margin-top: 1rem; }
    .stream-shell { padding: 1rem; margin-top: 1rem; }
    .muted { color: #6b7280; }
    .metric { font-size: 2rem; font-weight: 700; }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/">${siteTitle}</a>
      @for(link in navLinks) {
      <a href="${link.href}">${link.label}</a>
      }
    </nav>
  </header>
  <main>
    @block("content") {
    <p>Default reactive content</p>
    }
  </main>
  <footer>
    <p>${footerText}</p>
  </footer>
</body>
</html>
