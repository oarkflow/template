<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPL Template Playground</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: '#0891b2',
            surface: '#f8fafc',
            ink: '#0f172a'
          },
          boxShadow: {
            panel: '0 8px 24px rgba(15, 23, 42, 0.08)'
          }
        }
      }
    }
  </script>
  <style>
    .code-font { font-family: "JetBrains Mono", "Fira Code", ui-monospace, SFMono-Regular, Menlo, monospace; }
    .app-bg {
      background:
        radial-gradient(circle at 20% 0%, rgba(8,145,178,0.15), transparent 35%),
        radial-gradient(circle at 100% 20%, rgba(59,130,246,0.12), transparent 30%),
        linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
    }
    .dark .app-bg {
      background:
        radial-gradient(circle at 20% 0%, rgba(8,145,178,0.2), transparent 35%),
        radial-gradient(circle at 100% 20%, rgba(59,130,246,0.18), transparent 30%),
        linear-gradient(180deg, #0b1220 0%, #111827 100%);
    }
  </style>
</head>
<body class="h-screen overflow-hidden app-bg text-slate-800 dark:text-slate-100">
  <div class="h-screen w-full px-2 md:px-4 lg:px-5 py-3 md:py-4">
    <header class="mb-3">
      <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
        <div>
          <h1 class="text-2xl md:text-3xl font-semibold tracking-tight text-ink dark:text-white">SPL Template Playground</h1>
          <p class="text-xs md:text-sm text-slate-600 dark:text-slate-300">Write SPL templates and preview rendered HTML instantly.</p>
        </div>
        <div class="flex flex-wrap items-center gap-2">
          <span class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-xs border border-slate-300/70 dark:border-slate-700 bg-white/80 dark:bg-slate-900/60">
            <span class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
            <span id="healthText">Checking service...</span>
          </span>
          <button id="themeBtn" class="px-3 py-1.5 text-xs rounded-lg border border-slate-300 dark:border-slate-700 bg-white/80 dark:bg-slate-900/60 hover:bg-white dark:hover:bg-slate-900">Toggle Theme</button>
        </div>
      </div>
    </header>

    <main class="h-[calc(100vh-7.2rem)] grid grid-cols-1 xl:grid-cols-12 gap-3">
      <aside class="xl:col-span-2 bg-white/80 dark:bg-slate-900/70 border border-slate-200 dark:border-slate-800 rounded-xl shadow-panel p-3 overflow-hidden">
        <div class="mb-3">
          <label for="exampleSearch" class="text-xs uppercase tracking-wide text-slate-500">Examples</label>
          <input id="exampleSearch" type="text" placeholder="Find an example..." class="mt-1 w-full text-sm rounded-md border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-950 px-2 py-1.5" />
        </div>
        <div id="exampleList" class="space-y-1 h-[calc(100%-4rem)] overflow-auto pr-1"></div>
      </aside>

      <section class="xl:col-span-10 h-full flex flex-col gap-3 min-h-0">
        <div class="bg-white/80 dark:bg-slate-900/70 border border-slate-200 dark:border-slate-800 rounded-xl shadow-panel overflow-hidden flex flex-col flex-1 min-h-0" style="flex-basis:55%">
          <div class="px-3 md:px-4 py-2.5 border-b border-slate-200 dark:border-slate-800 flex flex-wrap items-center justify-between gap-2 shrink-0">
            <div class="flex flex-wrap items-center gap-x-3 gap-y-1 text-xs text-slate-500 dark:text-slate-400">
              <span>Run: <kbd class="px-1.5 py-0.5 rounded border border-slate-300 dark:border-slate-700">Ctrl/Cmd + Enter</kbd></span>
              <span>Status <span id="statusBadge" class="ml-1 inline-flex items-center px-2 py-0.5 rounded-full text-[11px] bg-slate-200 text-slate-700">Idle</span></span>
              <span>Duration <span id="duration" class="ml-1 font-semibold text-slate-700 dark:text-slate-200">-</span></span>
            </div>
            <div class="flex flex-wrap items-center gap-2">
              <button id="copyBtn" class="px-3 py-1.5 text-sm rounded-md border border-slate-300 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800">Copy</button>
              <button id="resetBtn" class="px-3 py-1.5 text-sm rounded-md border border-slate-300 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800">Reset</button>
              <button id="runBtn" class="px-4 py-1.5 text-sm rounded-md bg-brand text-white hover:bg-cyan-700 transition">Run</button>
            </div>
          </div>
          <div class="w-full flex-1 min-h-0 flex flex-row">
            <div class="flex-1 min-w-0 flex flex-col" style="flex-basis:60%">
              <div class="px-3 py-1 text-[11px] uppercase tracking-wide text-slate-500 border-b border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950/40 shrink-0">Template</div>
              <div id="templateEditor" class="w-full flex-1 min-h-0"></div>
            </div>
            <div class="w-px bg-slate-300 dark:bg-slate-700 shrink-0"></div>
            <div class="flex-1 min-w-0 flex flex-col" style="flex-basis:40%">
              <div class="px-3 py-1 text-[11px] uppercase tracking-wide text-slate-500 border-b border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950/40 shrink-0">Data (JSON)</div>
              <div id="dataEditor" class="w-full flex-1 min-h-0"></div>
            </div>
          </div>
        </div>

        <div class="bg-white/80 dark:bg-slate-900/70 border border-slate-200 dark:border-slate-800 rounded-xl shadow-panel overflow-hidden flex flex-col flex-1 min-h-0" style="flex-basis:45%">
          <div class="px-3 md:px-4 py-2 border-b border-slate-200 dark:border-slate-800 flex items-center gap-2 shrink-0">
            <button data-tab="preview" class="tab-btn px-2.5 py-1 text-xs rounded-md bg-slate-200 dark:bg-slate-800">Preview</button>
            <button data-tab="result" class="tab-btn px-2.5 py-1 text-xs rounded-md hover:bg-slate-200 dark:hover:bg-slate-800">HTML</button>
            <button data-tab="error" class="tab-btn px-2.5 py-1 text-xs rounded-md hover:bg-slate-200 dark:hover:bg-slate-800">Errors</button>
          </div>
          <div class="flex-1 min-h-0 relative">
            <iframe id="preview" data-panel="preview" class="panel absolute inset-0 w-full h-full bg-white border-0" sandbox="allow-scripts"></iframe>
            <pre id="result" data-panel="result" class="panel hidden p-4 text-sm code-font absolute inset-0 overflow-auto bg-slate-50 dark:bg-slate-950/60">-</pre>
            <pre id="error" data-panel="error" class="panel hidden p-4 text-sm code-font absolute inset-0 overflow-auto whitespace-pre-wrap break-words bg-rose-50 dark:bg-rose-950/20 text-rose-700 dark:text-rose-300"></pre>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
