<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${title} - ${siteName}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.5; color: #1e293b; background: #f8fafc; font-size: 0.9rem; }
        .container { max-width: 100%; margin: 0 auto; padding: 0 1.5rem; }
        header { background: #0f172a; color: #f1f5f9; padding: 0.6rem 0; }
        header h1 { font-size: 1.1rem; font-weight: 600; }
        nav { display: flex; gap: 1.5rem; margin-top: 0.35rem; }
        nav a { color: #94a3b8; text-decoration: none; font-size: 0.8rem; transition: color 0.15s; }
        nav a:hover { color: #e2e8f0; }
        main { padding: 1rem 0; }
        footer { border-top: 1px solid #e2e8f0; padding: 0.75rem 0; text-align: center; color: #94a3b8; font-size: 0.75rem; }
        .card { background: white; border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 0.85rem; margin-bottom: 0.6rem; }
        .card h3 { margin-bottom: 0.4rem; font-size: 0.9rem; color: #334155; }
        .badge { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 500; }
        .badge-green { background: #dcfce7; color: #166534; }
        .badge-amber { background: #fef3c7; color: #92400e; }
        .badge-red { background: #fee2e2; color: #991b1b; }
        .badge-blue { background: #dbeafe; color: #1e40af; }
        .badge-purple { background: #f3e8ff; color: #6b21a8; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { text-align: left; padding: 0.4rem 0.6rem; border-bottom: 1px solid #e2e8f0; }
        th { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; }
        code { background: #f1f5f9; padding: 0.1rem 0.3rem; border-radius: 0.2rem; font-size: 0.8em; color: #e11d48; }
        pre { background: #0f172a; color: #e2e8f0; padding: 0.75rem; border-radius: 0.375rem; overflow-x: auto; font-size: 0.8rem; line-height: 1.4; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; align-items: start; }
        .two-col .col-right { position: sticky; top: 1rem; }
        @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } .two-col .col-right { position: static; } }
        @media (max-width: 640px) { .grid-2 { grid-template-columns: 1fr; } }
        .section-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: #94a3b8; margin-bottom: 0.35rem; }
        dl { display: grid; grid-template-columns: auto 1fr; gap: 0.2rem 0.75rem; }
        dt { font-weight: 600; color: #475569; font-size: 0.8rem; }
        dd { color: #64748b; font-size: 0.8rem; }
        .info-btn { display: inline-flex; align-items: center; justify-content: center; width: 1.25rem; height: 1.25rem; border-radius: 50%; border: 1px solid #94a3b8; background: #f8fafc; color: #64748b; font-size: 0.65rem; font-weight: 700; cursor: pointer; vertical-align: middle; margin-left: 0.35rem; line-height: 1; }
        .info-btn:hover { background: #e2e8f0; color: #334155; }
        dialog[open] { border: none; border-radius: 0.5rem; padding: 0; max-width: 36rem; width: 90%; box-shadow: 0 25px 50px -12px rgba(0,0,0,.25); inset: 0; margin: auto; }
        dialog::backdrop { background: rgba(15,23,42,.45); }
        dialog .dialog-header { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1rem; border-bottom: 1px solid #e2e8f0; background: #f8fafc; border-radius: 0.5rem 0.5rem 0 0; }
        dialog .dialog-header h4 { font-size: 0.85rem; color: #334155; margin: 0; }
        dialog .dialog-close { background: none; border: none; font-size: 1.1rem; cursor: pointer; color: #94a3b8; padding: 0.2rem; line-height: 1; }
        dialog .dialog-close:hover { color: #334155; }
        dialog .dialog-body { padding: 1rem; font-size: 0.8rem; color: #475569; line-height: 1.7; max-height: 70vh; overflow-y: auto; }
    </style>
    @block("head") {}
</head>
<body>
    <header>
        <div class="container">
            <h1>${siteName}</h1>
            @include("partials/nav.html")
        </div>
    </header>
    <main>
        <div class="container">
            @block("content") {
                <p>No content provided.</p>
            }
        </div>
    </main>
    <footer>
        <div class="container">
            <p>${siteName} &mdash; Powered by SPL Template Engine &amp; GoFiber</p>
        </div>
    </footer>
</body>
</html>
