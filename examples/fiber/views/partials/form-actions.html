@// FORM ACTIONS — Submit (snapshot) + Reset

<div class="card" style="margin-top: 0.35rem;">
    <div class="section-label">Form Actions</div>
    <div style="display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap;">
        <button on:click="submitForm" style="padding: 0.45rem 1.25rem; border-radius: 0.375rem; border: none; background: #3b82f6; color: white; font-size: 0.95rem; font-weight: 600; cursor: pointer;">
            Submit Form
        </button>
        <button on:click="resetAll" style="padding: 0.45rem 1.25rem; border-radius: 0.375rem; border: 1px solid #d1d5db; background: white; font-size: 0.95rem; cursor: pointer; color: #64748b;">
            Reset All
        </button>
    </div>
</div>
