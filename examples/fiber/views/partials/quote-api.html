@// INSPIRATIONAL QUOTE — uses data-spl-api-* (GET request on click)

<div class="card" style="background: #fefce8; border-color: #fde68a;">
    <div class="section-label">Inspirational Quote</div>
    <div style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;">
        <button
            data-spl-api-url="/api/quote"
            data-spl-api-method="GET"
            data-spl-api-target="quote"
            data-spl-api-parse="json"
            data-spl-api-event="click"
            style="padding: 0.5rem 1.25rem; border-radius: 0.375rem; border: 1px solid #d97706; background: #fef3c7; color: #92400e; font-size: 0.8rem; cursor: pointer; font-weight: 600;">
            Load Random Quote
        </button>
        @reactive(quote) {
            <blockquote style="flex: 1; margin: 0; padding: 0.75rem 1rem; border-left: 3px solid #d97706; font-style: italic; color: #78350f; font-size: 0.8rem;">
                &ldquo;${quote.text}&rdquo;
                @if(quote.author) {
                    <span style="display: block; font-style: normal; font-size: 0.8rem; color: #a16207; margin-top: 0.25rem;">&mdash; ${quote.author}</span>
                }
            </blockquote>
        }
    </div>
</div>
