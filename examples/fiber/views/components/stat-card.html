@component("StatCard", value, label, bg = "#dcfce7", color = "#166534") {
    <div style="flex: 1; min-width: 110px; padding: 0.5rem; background: ${bg}; border-radius: 0.3rem; text-align: center;">
        <div style="font-size: 1.1rem; font-weight: 700; color: ${color};">${value}</div>
        <div style="font-size: 0.65rem; color: ${color};">${label}</div>
    </div>
}
